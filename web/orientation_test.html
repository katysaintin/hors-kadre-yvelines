<script>

      {texte:"Ingénieur(e) ou expert(e) technique dans mon domaine", scores:{eleven:3,steve:2}},
      {texte:"Chef(fe) de projet ou entrepreneur(e) à l'international", scores:{luffy:3,eleven:1}},
      {texte:"Chercheur(se) ou expert(e) pointu(e) dans ma passion", scores:{wednesday:3,tanjiro:2}},

  {

    texte:"Ton rapport au stress et à la compétition ?",

      {texte:"Je préfère un rythme régulier sans sprint final", scores:{steve:3,wednesday:1}},
      {texte:"Le stress me mobilise mais j'ai besoin de récupérer", scores:{eleven:2,luffy:2}},
      {texte:"J'évite la compétition — je préfère collaborer", scores:{luffy:2,wednesday:2}},
    ]

  {

    texte:"Quelles matières t'attirent le plus ? (que tu les aies choisies ou pas encore !)",
    reponses:[
      {texte:"🔢 Maths, Sciences exactes — j'aime la rigueur et les démonstrations", scores:{sasuke:3,eleven:2,tanjiro:1}},
      {texte:"💻 Techno, Informatique, Numérique, Électronique — je préfère la pratique", scores:{eleven:3,steve:2}},
      {texte:"📊 Économie, Langues, Sciences humaines, Histoire — le monde m'intéresse", scores:{luffy:3,wednesday:2}},
      {texte:"🌿 Sciences du vivant, Biologie, Santé — la nature et le corps humain", scores:{tanjiro:3,wednesday:1}},
      {texte:"📚 Littérature, Philosophie, Arts — comprendre le monde en profondeur", scores:{wednesday:3,luffy:1}},
    ]
  },
];

const PROFILS = {
  sasuke:{
    nom:"Sasuke Uchiha", emoji:"🔥", serie:"Naruto (Netflix)",
    slogan:"L'excellence ou rien",
    formation:"CPGE", filiere:"CPGE",
    desc:"Tu es taillé(e) pour la prépa. Compétiteur(rice) dans l'âme, tu transformes la pression en carburant. Les concours ne te font pas peur — ils te définissent. Ton objectif : intégrer une grande école et ne laisser personne te dépasser.",
    color:"linear-gradient(135deg,#1a0a2e,#4a0e8f)"
  },
  eleven:{
    nom:"Eleven", emoji:"⚡", serie:"Stranger Things (Netflix)",
    slogan:"La puissance dans l'action",
    formation:"BUT / École d'ingénieurs", filiere:"BUT",
    desc:"Tu apprends en faisant. Autodidacte, curieux(se), tu as une puissance cachée qui s'exprime dans les projets concrets. Pas besoin de briller en amphi — tu brilles sur le terrain.",
    color:"linear-gradient(135deg,#0a1a2e,#1a5276)"
  },
  steve:{
    nom:"Steve Harrington", emoji:"🎸", serie:"Stranger Things (Netflix)",
    slogan:"Solide, fiable, et meilleur qu'il n'y paraît",
    formation:"BTS", filiere:"BTS",
    desc:"Comme Steve avec sa guitare et son job de caissier-héros, tu n'es peut-être pas premier de la classe — mais tu es fiable, régulier(e) et tu finis toujours par t'en sortir. Le BTS est fait pour toi : concret, encadré, directement opérationnel.",
    color:"linear-gradient(135deg,#1a1a0a,#4a3a00)"
  },
  luffy:{
    nom:"Monkey D. Luffy", emoji:"🏴‍☠️", serie:"One Piece (Netflix)",
    slogan:"Le monde est trop petit pour moi",
    formation:"École de Commerce / BBA", filiere:"Ecole de Commerce",
    desc:"Tu rêves grand, tu fédères les autres naturellement et tu vises l'international. Les écoles de commerce sont ton terrain : réseau, projets, stages à l'étranger, et une équipage à constituer.",
    color:"linear-gradient(135deg,#1a0a0a,#7a1a00)"
  },
  wednesday:{
    nom:"Wednesday Addams", emoji:"🖤", serie:"Wednesday (Netflix)",
    slogan:"Je suis là pour comprendre, pas pour plaire",
    formation:"Licence / Master / Recherche", filiere:"Licence",
    desc:"Analytique, indépendant(e), tu creuses les sujets qui t'obsèdent sans te soucier des conventions. La licence te donne l'espace pour explorer à ton rythme. Le Master et la recherche t'attendent.",
    color:"linear-gradient(135deg,#0a0a0a,#2d0a2d)"
  },
  tanjiro:{
    nom:"Tanjiro Kamado", emoji:"🌊", serie:"Demon Slayer (Netflix)",
    slogan:"Une vocation, une mission",
    formation:"PASS / Paramédical", filiere:"PASS",
    desc:"Tu as une vocation claire et tu es prêt(e) à tout pour y arriver. Travail obsessionnel, sacrifice assumé, objectif précis — comme Tanjiro qui s'entraîne sans relâche. Le PASS ou le paramédical est ta voie.",
    color:"linear-gradient(135deg,#0a1a1a,#006a4a)"
  }
};

/* ================================================================
   ÉTAT
   ================================================================ */
let currentQ = 0;
let scores = {sasuke:0,eleven:0,steve:0,luffy:0,wednesday:0,tanjiro:0};
let profil = null;

/* ================================================================
   AFFICHAGE QUESTION
   ================================================================ */
function afficherQuestion(idx){
  const q = QUESTIONS[idx];
  const pct = Math.round((idx/QUESTIONS.length)*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent =
    'Question '+(idx+1)+' / '+QUESTIONS.length;

  const card = document.getElementById('questionCard');
  card.innerHTML = `
    <div class="q-num">Question ${idx+1} sur ${QUESTIONS.length}</div>
    <span class="q-emoji">${q.emoji}</span>
    <div class="q-texte">${q.texte}</div>
    <div class="reponses">
      ${q.reponses.map((r,i)=>`
        <button class="rep-btn" onclick="choisir(${i})">
          ${r.texte}
        </button>
      `).join('')}
    </div>
  `;
  // Réanimation
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = 'fadeIn .3s ease';
}

/* ================================================================
   CHOIX D'UNE RÉPONSE
   ================================================================ */
function choisir(repIdx){
  const q = QUESTIONS[currentQ];
  const rep = q.reponses[repIdx];

  // Mettre en évidence
  document.querySelectorAll('.rep-btn').forEach((b,i)=>{
    b.classList.toggle('selected', i===repIdx);
    b.disabled = true;
  });

  // Scorer
  for(const [profil,pts] of Object.entries(rep.scores)){
    scores[profil] = (scores[profil]||0) + pts;
  }

  // Question suivante après 300ms
  setTimeout(()=>{
    currentQ++;
    if(currentQ < QUESTIONS.length){
      afficherQuestion(currentQ);
    } else {
      afficherResultat();
    }
  }, 350);
}

/* ================================================================
   RÉSULTAT — redirige vers resultat.html (page partageable)
   ================================================================ */
function afficherResultat(){
  // Trouver le profil gagnant
  profil = Object.entries(scores)
    .sort((a,b)=>b[1]-a[1])[0][0];

  // Redirection vers la page résultat statique partageable
  window.location.href = 'resultat.html?profil=' + encodeURIComponent(profil);
}

function afficherResultatInPage_UNUSED(){
  profil = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const p = PROFILS[profil];
  document.getElementById('progressWrap').style.display='none';
  document.getElementById('questionWrap').style.display='none';
  document.getElementById('resultWrap').style.display='block';

  // Remplir le header
  document.getElementById('resultHeader').style.background = p.color;
  document.getElementById('resultHeader').innerHTML = `
    <div style="font-size:.72rem;color:#aaa;text-transform:uppercase;
      letter-spacing:.1em;margin-bottom:6px;">${p.serie}</div>
    <span style="font-size:4rem;">${p.emoji}</span>
    <div style="font-size:2rem;font-weight:700;color:#fff;margin:6px 0 4px;">${p.nom}</div>
    <div style="font-size:1rem;color:#ff6b35;font-style:italic;">"${p.slogan}"</div>
  `;

  document.getElementById('resultFormationBadge').innerHTML =
    `<span class="result-formation">🎓 ${p.formation}</span>`;
  document.getElementById('resultDesc').textContent = p.desc;

  // Charger formations
  chargerFormations();
}

/* ================================================================
   CHARGEMENT FORMATIONS VIA AJAX
   ================================================================ */
function chargerFormations(){
  if(!profil) return;
  const p = PROFILS[profil];
  const dept = document.getElementById('deptInput').value.trim().toUpperCase();
  const grid = document.getElementById('formationsGrid');
  grid.innerHTML = '<div class="loading">⏳ Chargement des formations…</div>';

  const url = 'orientation.php?filiere='
    + encodeURIComponent(p.filiere)
    + '&profil=' + encodeURIComponent(profil)
    + (dept ? '&dept='+encodeURIComponent(dept) : '')
    + '&format=json';

  fetch(url)
    .then(r=>r.json())
    .then(data=>{
      if(!data.formations || data.formations.length===0){
        grid.innerHTML = '<div class="loading">Aucune formation trouvée — essaie sans filtre géographique.</div>';
        return;
      }
      grid.innerHTML = data.formations.map(f=>{
        const taux = f.taux_acces ? Math.round(f.taux_acces)+'%' : '—';
        const ratio = f.ratio ? f.ratio+' cand./place' : '—';
        const tauxCls = f.taux_acces
          ? (f.taux_acces < 30 ? 'red' : (f.taux_acces > 60 ? 'green' : ''))
          : '';
        const internat = f.internat=='1' ? '🛏️ Internat' : '';
        const apprent  = f.apprentissage=='1' ? '🔧 Alternance' : '';
        return `
          <div class="form-card">
            <div class="nom">${f.nom_etablissement||'—'}</div>
            <div class="lieu">📍 ${f.commune||'—'} — ${f.departement||'—'}</div>
            <div style="font-size:.75rem;color:#aaa;margin-bottom:6px;">
              ${f.specialite||f.filiere_agregee||''}
            </div>
            <div class="stats">
              <span class="form-stat ${tauxCls}">Accès ${taux}</span>
              <span class="form-stat">${ratio}</span>
              ${internat?'<span class="form-stat">'+internat+'</span>':''}
              ${apprent?'<span class="form-stat">'+apprent+'</span>':''}
            </div>
            <a class="form-link" href="formation.php?cod=${f.cod_aff_form}">
              Voir la fiche →
            </a>
          </div>
        `;
      }).join('');
    })
    .catch(()=>{
      grid.innerHTML = '<div class="loading">Erreur de chargement — <a href="parcoursup.php">explorer manuellement</a>.</div>';
    });
}

function voirPageComplete(){
  if(!profil) return;
  const p = PROFILS[profil];
  const dept = document.getElementById('deptInput').value.trim().toUpperCase();
  let url = 'orientation.php?filiere='+encodeURIComponent(p.filiere)
           +'&profil='+encodeURIComponent(profil);
  if(dept) url += '&dept='+encodeURIComponent(dept);
  window.location.href = url;
}

function partagerLinkedIn(){
  if(!profil) return;
  const p = PROFILS[profil];
  const txt = encodeURIComponent(
    `Je suis ${p.emoji} ${p.nom} (${p.serie}) — ma formation idéale : ${p.formation}. `+
    `Découvre ton profil d'orientation sur Hors Kadre !`
  );
  window.open('https://www.linkedin.com/sharing/share-offsite/?url='+
    encodeURIComponent(window.location.href)+'&summary='+txt,'_blank');
}

function copierLien(){
  if(!profil) return;
  const p = PROFILS[profil];
  const txt = `Je suis ${p.emoji} ${p.nom} — ma formation idéale : ${p.formation}. `+
    `Fais le test sur Hors Kadre : `+window.location.href;
  navigator.clipboard.writeText(txt).then(()=>{
    alert('Lien copié ! 🎉');
  });
}
