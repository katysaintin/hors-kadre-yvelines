/* ================================================================
   LECTURE DES PARAMS GET
   ================================================================ */
function getParam(name) {
  const url = new URLSearchParams(window.location.search);
  return url.get(name) || '';
}

function render() {
  const profilId = getParam('profil');
  const p = PROFILS[profilId];
  const container = document.getElementById('result-container');

  if (!p) {
    container.innerHTML = `
      <div class="not-found">
        <div style="font-size:3rem;margin-bottom:14px;">🤔</div>
        <p style="margin-bottom:16px;">Profil introuvable…</p>

          → Faire le test d'orientation
        </a>

    return;

  const titleEl = document.getElementById('page-title');
  if (titleEl) titleEl.textContent = `Je suis ${p.nom} — Mon profil d'orientation Hors Kadre`;
  const ogTitle = document.querySelector('meta[property="og:title"]');
  if (ogTitle) ogTitle.setAttribute('content', `Je suis ${p.emoji} ${p.nom} — ${p.slogan}`);
  const ogDesc = document.querySelector('meta[property="og:description"]');
  if (ogDesc) ogDesc.setAttribute('content', `Ma formation idéale : ${p.formation}. Fais le test !`);
  const ogImg = document.querySelector('meta[property="og:image"]');

    <img src="${p.img}" alt="${p.nom}" class="perso-img"

      <div class="icon">${pw.icon}</div>
      <div class="label">${pw.label}</div>
    </div>`).join('');

              📷 Instagram
            </button>
            <button class="share-btn btn-fb" onclick="partagerFB()">
              👥 Facebook
            </button>
            <button class="share-btn btn-tiktok" onclick="partagerTikTok()">
              🎵 TikTok
            </button>
            <button class="share-btn btn-linkedin" onclick="partagerLinkedIn()">
              💼 LinkedIn
            </button>
            <button class="share-btn btn-copy" onclick="copierLien()">
              📋 Copier le lien
            </button>
          </div>
          <div class="share-feedback" id="share-feedback"></div>
        </div>

      </div>
    </div>

    <div class="refaire">
      Ce n'est pas ton profil ? <a href="orientation_test.html">→ Refaire le test</a>
    </div>
  `;
}

/* ================================================================
   PARTAGE
   ================================================================ */
function _getShareText() {
  const profilId = getParam('profil');
  const p = PROFILS[profilId];
  if (!p) return '';
  return `Je suis ${p.emoji} ${p.nom} — "${p.slogan}"\nMa formation idéale : ${p.formation}\nFais le test : ${window.location.origin}/orientation_test.html\n#HorsKadre #Parcoursup #Orientation`;
}

function partagerInsta() {
  /* Instagram n'a pas d'API web — on enregistre l'image et on explique */
  telechargerImage('insta');
}

function partagerFB() {
  const url = encodeURIComponent(window.location.href);
  window.open('https://www.facebook.com/sharer/sharer.php?u='+url, '_blank');
}

function partagerTikTok() {
  /* TikTok n'a pas d'API web — on enregistre l'image */
  telechargerImage('tiktok');
}

function partagerLinkedIn() {
  const url = encodeURIComponent(window.location.href);
  window.open('https://www.linkedin.com/sharing/share-offsite/?url='+url, '_blank');
}

function copierLien() {
  const profilId = getParam('profil');
  const p = PROFILS[profilId];
  if (!p) return;
  const texte = _getShareText();
  navigator.clipboard.writeText(texte).then(() => {
    _feedback('✅ Copié ! Colle-le où tu veux 🎉');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = texte; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    _feedback('✅ Copié !');
  });
}

function _feedback(msg) {
  const fb = document.getElementById('share-feedback');
  if (fb) { fb.textContent = msg; setTimeout(()=>fb.textContent='', 4000); }
}

/* ================================================================
   TÉLÉCHARGEMENT IMAGE — html2canvas
   ================================================================ */
let _shareTarget = 'default';
function telechargerImage(target='default') {
  _shareTarget = target;
  const profilId = getParam('profil');
  const p = PROFILS[profilId];
  if (!p) return;

  const btn = document.querySelector('.btn-download');
  const oldText = btn.innerHTML;
  btn.innerHTML = '⏳ Génération en cours…';
  btn.disabled = true;

  /* ---------------------------------------------------------------
   * On dessine la carte directement sur Canvas 2D
   * L'image de l'avatar est déjà chargée dans le DOM — on la réutilise
   * --------------------------------------------------------------- */
  const W = 500, H = 700;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');

  // Fond dégradé selon le profil
  var colors = {
    sasuke:  ['#1a0a2e','#4a0e8f'],
    eleven:  ['#0a1a2e','#1a5276'],
    steve:   ['#1a1a0a','#3a2a00'],
    luffy:   ['#1a0a0a','#7a1a00'],
    wednesday:['#0a0a0a','#2d0a2d'],
    tanjiro: ['#0a1a1a','#006a4a'],
  };
  var c = colors[profilId] || ['#1a0a2e','#0d0d0d'];
  var grd = ctx.createLinearGradient(0, 0, W, H);
  grd.addColorStop(0, c[0]);
  grd.addColorStop(1, c[1]);
  ctx.fillStyle = grd;
  ctx.roundRect(0, 0, W, H, 28);
  ctx.fill();

  // Série en haut
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = '500 22px Georgia';
  ctx.textAlign = 'center';
  ctx.letterSpacing = '3px';
  ctx.fillText(p.serie.toUpperCase(), W/2, 54);

  // Avatar — récupérer l'image déjà chargée dans le DOM
  var imgEl = document.querySelector('.perso-img');
  var drawRest = function() {
    // Cercle avatar centré — grand
    var cx = W/2, cy = 240, r = 170;
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.clip();
    if (imgEl && imgEl.complete && imgEl.naturalWidth > 0) {
      ctx.drawImage(imgEl, cx-r, cy-r, r*2, r*2);
    }
    ctx.restore();
    // Bordure cercle
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 5;
    ctx.stroke();
    // Halo extérieur
    ctx.beginPath();
    ctx.arc(cx, cy, r+10, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.10)';
    ctx.lineWidth = 8;
    ctx.stroke();

    // Nom
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 52px Georgia';
    ctx.textAlign = 'center';
    ctx.letterSpacing = '0px';
    ctx.fillText(p.emoji + ' ' + p.nom, W/2, 454);

    // Slogan
    ctx.fillStyle = 'rgba(255,255,255,0.82)';
    ctx.font = 'italic 26px Georgia';
    ctx.fillText('"' + p.slogan + '"', W/2, 500);

    // Badge formation
    var badgeY = 556, badgeW = 340, badgeH = 54;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(W/2 - badgeW/2, badgeY, badgeW, badgeH, 27);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 24px Georgia';
    ctx.fillText('🎓 ' + p.formation, W/2, badgeY + 34);

    // URL en bas
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '18px Georgia';
    ctx.fillText('katy.ho.free.fr/orientation_test.html', W/2, H - 28);

    // Télécharger
    var link = document.createElement('a');
    link.download = 'mon-profil-' + profilId + '-horskadre.jpg';
    link.href = cv.toDataURL('image/jpeg', 0.93);
    link.click();

    var msgs = {
      insta:   '✅ Enregistrée ! Ouvre Instagram → + → Depuis la galerie 🎉',
      tiktok:  '✅ Enregistrée ! Ouvre TikTok → + → Importer 🎵',
      default: '✅ Image enregistrée ! 🎉'
    };
    btn.innerHTML = msgs[_shareTarget] || msgs.default;
    btn.disabled = false;
    _feedback(msgs[_shareTarget] || msgs.default);
    setTimeout(function(){ btn.innerHTML = oldText; }, 5000);
  };

  // Si l'image est déjà chargée on dessine, sinon on attend
  if (imgEl && imgEl.complete && imgEl.naturalWidth > 0) {
    setTimeout(drawRest, 50);
  } else if (imgEl) {
    imgEl.onload = drawRest;
  } else {
    // Pas d'image — dessiner quand même sans avatar
    setTimeout(drawRest, 50);
  }
}

/* ================================================================
   INIT
   ================================================================ */
document.addEventListener('DOMContentLoaded', function() {
  try {
    render();
  } catch(e) {
    console.error('Erreur render:', e);
    const c = document.getElementById('result-container');
    if (c) c.innerHTML = '<div class="not-found" style="padding:40px;text-align:center;">⚠️ Erreur JS : ' + e.message + '<br><br><a href="orientation_test.html" style="color:#ff6b35;font-weight:700;">→ Refaire le test</a></div>';
  }
});
</script>
