/* ================================================================
   CONSTRUCTION URL ORIENTATION — avec modale si Q4 = rester
   ================================================================ */
function buildOrientationUrl(p) {
  var q4 = parseInt(getParam('q4'));
  var url = 'orientation.php?type_formation=' + encodeURIComponent(
    p.filiere === 'Ecole de Commerce' ? 'Commerce' :
    p.filiere === 'PASS' ? 'Sante' :
    p.filiere === 'BUT' ? 'BUT' :
    p.filiere === 'BTS' ? 'BTS' :
    p.filiere === 'Licence' ? 'Licence' :
    p.filiere === 'CPGE' ? 'CPGE' : p.filiere
  );
  url += '&profil=' + encodeURIComponent(getParam('profil'));
  // Q4 index 0 = "Je reste dans mon département"
  if (q4 === 0) {
    url += '&show_modal=1&departement=';
  }
  return url;
}

}

/* ================================================================
   PARTAGE — logique unifiée Web Share API
   ================================================================ */
async function genererImageStory(profilId) {
  var p = PROFILS[profilId]; if (!p) return null;
  var W=1080,H=1920,cv=document.createElement('canvas');
  cv.width=W;cv.height=H;var ctx=cv.getContext('2d');
  var colors={sasuke:['#1a0a2e','#4a0e8f'],eleven:['#0a1a2e','#1a5276'],
    steve:['#1a1a0a','#3a2a00'],luffy:['#1a0a0a','#7a1a00'],
    wednesday:['#0a0a0a','#2d0a2d'],tanjiro:['#0a1a1a','#006a4a']};
  var c=colors[profilId]||['#1a0a2e','#0d0d0d'];
  var grd=ctx.createLinearGradient(0,0,W,H);
  grd.addColorStop(0,c[0]);grd.addColorStop(1,c[1]);
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='38px Georgia';ctx.textAlign='center';
  ctx.fillText('HORS KADRE',W/2,100);
  ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font='42px Georgia';
  ctx.fillText(p.serie.toUpperCase(),W/2,190);
  var imgEl=document.querySelector('.perso-img');
  var r=360,cx=W/2,cy=700;
  if(imgEl&&imgEl.complete&&imgEl.naturalWidth>0){
    ctx.save();ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.clip();
    ctx.drawImage(imgEl,cx-r,cy-r,r*2,r*2);ctx.restore();
  }
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=10;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,r+18,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=16;ctx.stroke();
  function fitTx(t,mw,ms,mi,tpl){var s=ms;while(s>=mi){ctx.font=tpl.replace('##',s);if(ctx.measureText(t).width<=mw)break;s-=4;}}
  var mw=W-80;
  ctx.fillStyle='#fff';ctx.textAlign='center';
  var nomText=p.emoji+' '+p.nom;
  fitTx(nomText,mw,110,60,'bold ## px Georgia');ctx.fillText(nomText,W/2,1160);
  ctx.fillStyle='rgba(255,255,255,0.82)';
  var sloganText='"'+p.slogan+'"';
  fitTx(sloganText,mw,56,32,'italic ## px Georgia');ctx.fillText(sloganText,W/2,1260);
  var formText='🎓 '+p.formation;
  ctx.font='bold 50px Georgia';
  var fw=ctx.measureText(formText).width+80;
  var bw=Math.min(Math.max(fw,400),mw),by=1340,bh=90;
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=3;
  ctx.beginPath();ctx.roundRect(W/2-bw/2,by,bw,bh,45);ctx.fill();ctx.stroke();
  ctx.fillStyle='#fff';ctx.fillText(formText,W/2,by+62);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='38px Georgia';
  ctx.fillText('Et toi, tu es qui ? 👀',W/2,1520);
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='34px Georgia';
  ctx.fillText('katy.ho.free.fr/orientation_test.html',W/2,1840);
  return new Promise(function(res){cv.toBlob(function(b){res(b);},'image/jpeg',0.92);});
}

/* Afficher l'image en plein écran — appui long → Galerie (solution Canva) */
async function afficherImagePleinEcran(profilId) {
  if(typeof gtag!=='undefined')gtag('event','share_result',{profil:profilId,plateforme:'modal'});
  var blob = await genererImageStory(profilId);
  if(!blob){ _feedback('Erreur generation image'); return; }
  var dataURL = await new Promise(function(res){
    var r=new FileReader(); r.onload=function(){res(r.result);}; r.readAsDataURL(blob);
  });
  var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
  var modal = document.createElement('div');
  modal.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;box-sizing:border-box;';
  var img = document.createElement('img');
  img.src = dataURL;
  img.style.cssText='max-width:85%;max-height:65%;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.5);';
  var msg = document.createElement('div');
  msg.style.cssText='color:#fff;text-align:center;margin-top:24px;font-size:15px;line-height:1.7;max-width:88%;font-family:Georgia,serif;';
  msg.innerHTML = "<p style=\"font-size:19px;margin-bottom:10px;font-weight:700;\">📸 Appuie longuement sur image</p>"
    + (isIOS
      ? "<p style=\"opacity:.75;\">Puis choisis <strong>Enregistrer dans Photos</strong><br>Ensuite ouvre Instagram pour poster !</p>"
      : "<p style=\"opacity:.75;\">Puis choisis <strong>Telecharger image</strong><br>Ensuite ouvre Instagram pour poster !</p>");
  var btnClose = document.createElement('button');
  btnClose.textContent='✕ Fermer';
  btnClose.style.cssText='position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);color:#fff;border:none;padding:8px 18px;border-radius:20px;font-size:15px;cursor:pointer;font-family:Georgia,serif;';
  btnClose.onclick=function(){ document.body.removeChild(modal); };
  modal.onclick=function(e){ if(e.target===modal) document.body.removeChild(modal); };
  modal.appendChild(btnClose);
  modal.appendChild(img);
  modal.appendChild(msg);
  document.body.appendChild(modal);
}

function partagerLinkedIn(){

  window.open('https://www.linkedin.com/sharing/share-offsite/?url='+encodeURIComponent(window.location.href),'_blank');

function copierLien(){
  var url=window.location.href;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(function(){_feedback('Lien copie !');}).catch(function(){_fb2(url);});
  }else{_fb2(url);}
}
function _fb2(t){
  var ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.left='-9999px';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');_feedback('Lien copie !');}catch(e){_feedback('Copiez URL manuellement');}
  document.body.removeChild(ta);
}
function telechargerImage(){partagerImage(getParam('profil'),'download');}
function _feedback(msg){
  var fb=document.getElementById('share-feedback');
  if(fb){fb.textContent=msg;setTimeout(function(){fb.textContent='';},4000);}
}
